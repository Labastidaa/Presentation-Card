<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="styles.css">
    <title>Card Presentation</title>
</head>
<body>
    <section>
        <div class="card">
            <div class="header">
                <img src="/images/blockchain.jpg" alt="header-image">
            </div>
            <div class="info">
                <div class="profile-container">
                    <div class="profile">
                        <img src="https://lh3.googleusercontent.com/a-/AOh14GiEpFnR_mztEi7EdlSYnWRuHJPoAvSvQydk4MpQDHE=s192-c-rg-br100" alt="profile-image">
                    </div>
                </div>
                <p>Jesus Geovanni Labastida Vázquez</p>
                <p>Developer </p>
                <div class="button-container">
                    <button class="button-github">
                        <span></span>
                    </button>
                    <button class="button-linkedin">
                        <span></span>
                    </button>
                </div>
            </div> 
        </div>
    </section>

</body>
</html>
